name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  Deploy:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup

      - name: set variables from PR number
        id: vars
        run: |
          database_name="recoverage-preview-db-pr-${{ github.event.number }}"
          worker_name="recoverage-preview-pr-${{ github.event.number }}"
          echo "database_name=$database_name" >> $GITHUB_OUTPUT
          echo "worker_name=$worker_name" >> $GITHUB_OUTPUT

      - name: teardown preview database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd recoverage.cloud
          bun --bun wrangler d1 delete "recoverage-preview-db-pr-${{ github.event.number }}" -y || true

      - name: create preview database
        id: create_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
        run: |
          cd recoverage.cloud
          echo "DATABASE_NAME: $DATABASE_NAME"
          bun --bun wrangler d1 create "$DATABASE_NAME" || {
            echo "Failed to create database:"
            exit 1
          }

          database_id=$(bun --bun wrangler d1 list --json | jq -r --arg name "$DATABASE_NAME" '.[] | select(.name == $name) | .uuid // .database_id') || {
            echo "Failed to find database_id for $DATABASE_NAME"
            exit 1
          }

          if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
            echo "Failed to find database_id for $DATABASE_NAME"
            exit 1
          fi

          echo "Database ID: $database_id"
          echo "database_id=$database_id" >> $GITHUB_OUTPUT

      - name: configure preview worker
        env:
          PR_NUMBER: ${{ github.event.number }}
          DATABASE_ID: ${{ steps.create_db.outputs.database_id }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
          WORKER_NAME: ${{ steps.vars.outputs.worker_name }}
        run: |
          bun run --filter="recoverage.cloud" preview:config
          cat recoverage.cloud/wrangler-preview.jsonc

      - name: deploy preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
        run: |
          printenv > recoverage.cloud/.env
          chmod +x recoverage.cloud/.env
          bun --bun run --filter="recoverage.cloud" preview

  Teardown:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - name: teardown all
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd recoverage.cloud
          bun --bun wrangler delete --name recoverage-preview-pr-${{ github.event.number }}
          bun --bun wrangler d1 delete recoverage-preview-db-pr-${{ github.event.number }}
