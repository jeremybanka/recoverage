name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  Deploy:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup

      - name: set variables from PR number
        id: vars
        run: |
          database_name="recoverage-preview-db-pr-${{ github.event.number }}"
          worker_name="recoverage-preview-pr-${{ github.event.number }}"
          echo "database_name=$database_name" >> $GITHUB_OUTPUT
          echo "worker_name=$worker_name" >> $GITHUB_OUTPUT

      - name: create or reuse preview database
        id: create_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
          WORKER_NAME: ${{ steps.vars.outputs.worker_name }}
        run: |
          set -o pipefail
          cd recoverage.cloud
          echo "DATABASE_NAME: $DATABASE_NAME"

          resolve_database_id() {
            local database_id

            database_id="$(bun --bun wrangler d1 info "$DATABASE_NAME" --json 2>/dev/null \
              | jq -r '.uuid // .database_id // .id // empty' || true)"

            if [ -n "$database_id" ]; then
              echo "$database_id"
              return
            fi

            bun --bun wrangler d1 list --json \
              | jq -r --arg name "$DATABASE_NAME" '.[] | select(.name == $name) | .uuid // .database_id // .id // empty'
          }

          parse_database_id() {
            sed -nE \
              -e 's/.*"database_id"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
              -e 's/.*database_id[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
              -e 's/.*"uuid"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
              -e 's/.*"id"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
              | head -n 1
          }

          database_id="$(resolve_database_id)"

          if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
            echo "Creating preview database $DATABASE_NAME"
            placeholder_database_id="00000000-0000-0000-0000-000000000000"
            DATABASE_ID="$placeholder_database_id" bun __scripts__/configure-preview.bun.ts
            create_output="$(bun --bun wrangler d1 create "$DATABASE_NAME" --config wrangler-preview.jsonc --binding DB --use-remote --update-config 2>&1)"
            echo "$create_output"
            database_id="$(echo "$create_output" | parse_database_id)"

            if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
              database_id="$(jq -r --arg name "$DATABASE_NAME" --arg placeholder "$placeholder_database_id" '.d1_databases[] | select(.database_name == $name) | .database_id // empty | select(. != $placeholder)' wrangler-preview.jsonc)"
            fi
          else
            echo "Reusing preview database $DATABASE_NAME"
          fi

          if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
            for attempt in 1 2 3 4 5; do
              database_id="$(resolve_database_id)"

              if [ -n "$database_id" ] && [ "$database_id" != "null" ]; then
                break
              fi

              echo "Waiting for database_id for $DATABASE_NAME (attempt $attempt/5)"
              sleep 3
            done
          fi

          if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
            echo "Failed to find database_id for $DATABASE_NAME"
            exit 1
          fi

          echo "Database ID: $database_id"
          echo "database_id=$database_id" >> $GITHUB_OUTPUT

      - name: configure preview worker
        env:
          PR_NUMBER: ${{ github.event.number }}
          DATABASE_ID: ${{ steps.create_db.outputs.database_id }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
          WORKER_NAME: ${{ steps.vars.outputs.worker_name }}
        run: |
          bun run --filter="recoverage.cloud" preview:config
          cat recoverage.cloud/wrangler-preview.jsonc

      - name: deploy preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
        run: |
          bun --bun run --filter="recoverage.cloud" preview

  Teardown:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - name: teardown all
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd recoverage.cloud
          bun --bun wrangler delete --name recoverage-preview-pr-${{ github.event.number }} || true
          bun --bun wrangler d1 delete recoverage-preview-db-pr-${{ github.event.number }} -y || true
