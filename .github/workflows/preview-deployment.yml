name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  Deploy:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup

      - name: set variables from PR number
        id: vars
        run: |
          database_name="recoverage-preview-db-pr-${{ github.event.number }}"
          worker_name="recoverage-preview-pr-${{ github.event.number }}"
          echo "database_name=$database_name" >> $GITHUB_OUTPUT
          echo "worker_name=$worker_name" >> $GITHUB_OUTPUT

      - name: create or reuse preview database
        id: create_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
          WORKER_NAME: ${{ steps.vars.outputs.worker_name }}
        run: |
          set -o pipefail
          cd recoverage.cloud
          echo "DATABASE_NAME: $DATABASE_NAME"

          account_id="$CLOUDFLARE_ACCOUNT_ID"
          if [ -z "$account_id" ]; then
            account_id="$(bun --bun wrangler whoami --json | jq -r '.accounts[0].id // empty')"
          fi

          if [ -z "$account_id" ]; then
            echo "Failed to resolve Cloudflare account id"
            exit 1
          fi

          api_base="https://api.cloudflare.com/client/v4/accounts/$account_id/d1/database"

          resolve_database_id() {
            curl --fail --silent --show-error \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$api_base?name=$DATABASE_NAME" \
              | jq -r --arg name "$DATABASE_NAME" '.result[]? | select(.name == $name) | .uuid // .database_id // .id // empty' \
              | head -n 1
          }

          parse_database_id() {
            sed -nE \
              -e 's/.*"database_id"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
              -e 's/.*database_id[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' \
              -e 's/.*"uuid"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
              -e 's/.*"id"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/p' \
              | head -n 1
          }

          database_id="$(resolve_database_id)"

          if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
            echo "Creating preview database $DATABASE_NAME"
            create_response="$(jq -n --arg name "$DATABASE_NAME" '{name: $name}' \
              | curl --silent --show-error \
                --request POST \
                --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                --header "Content-Type: application/json" \
                --data @- \
                "$api_base")"
            echo "$create_response" | jq .
            database_id="$(echo "$create_response" | jq -r '.result.uuid // .result.database_id // .result.id // empty')"

            if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
              database_id="$(echo "$create_response" | parse_database_id)"
            fi

            if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
              database_id="$(resolve_database_id)"
            fi
          else
            echo "Reusing preview database $DATABASE_NAME"
          fi

          if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
            for attempt in 1 2 3 4 5; do
              database_id="$(resolve_database_id)"

              if [ -n "$database_id" ] && [ "$database_id" != "null" ]; then
                break
              fi

              echo "Waiting for database_id for $DATABASE_NAME (attempt $attempt/5)"
              sleep 3
            done
          fi

          if [ -z "$database_id" ] || [ "$database_id" = "null" ]; then
            echo "Failed to find database_id for $DATABASE_NAME"
            exit 1
          fi

          echo "Database ID: $database_id"
          echo "database_id=$database_id" >> $GITHUB_OUTPUT

      - name: configure preview worker
        env:
          PR_NUMBER: ${{ github.event.number }}
          DATABASE_ID: ${{ steps.create_db.outputs.database_id }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
          WORKER_NAME: ${{ steps.vars.outputs.worker_name }}
        run: |
          bun run --filter="recoverage.cloud" preview:config
          cat recoverage.cloud/wrangler-preview.jsonc

      - name: deploy preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DATABASE_NAME: ${{ steps.vars.outputs.database_name }}
        run: |
          bun --bun run --filter="recoverage.cloud" preview

  Teardown:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/setup
      - name: teardown all
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd recoverage.cloud
          bun --bun wrangler delete --name recoverage-preview-pr-${{ github.event.number }} || true
          bun --bun wrangler d1 delete recoverage-preview-db-pr-${{ github.event.number }} -y || true
