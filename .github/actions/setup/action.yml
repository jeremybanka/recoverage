name: Setup
description: Install the requested mise tools and bun dependencies.
inputs:
  install_args:
    description: Space-separated mise tools to install.
    required: false
    default: "bun node"
runs:
  using: composite
  steps:
    - name: Install Mise tools
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      with:
        version: 2026.5.15
        install_args: ${{ inputs.install_args }}

    - name: Configure Git
      shell: bash
      run: |
        git config --global init.defaultBranch main
        git config --global user.email "you@example.com"
        git config --global user.name "Your Name"
